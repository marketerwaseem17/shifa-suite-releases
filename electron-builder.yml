appId: com.shifasuite.clinic
productName: Shifa Suite
copyright: "© 2025 Shifa Suite. All rights reserved."

directories:
  output: release
  buildResources: build

# Files to include in the package.
# Only production dependencies (better-sqlite3, exceljs, pdf-lib) ship in node_modules.
# Renderer packages (react, tailwind, lucide-react, etc.) are pre-bundled by Vite into dist/.
files:
  - dist/**
  - electron/**
  - "!electron/**/*.map"
  - package.json

# Unpack native modules so they are accessible at runtime (not inside asar)
asar: true
asarUnpack:
  - "node_modules/better-sqlite3/**"

# Windows build config
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico
  requestedExecutionLevel: asInvoker
  artifactName: "Shifa-Suite-Setup-${version}.exe"

# NSIS installer
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "Shifa Suite"
  installerIcon: resources/icon.ico
  uninstallerIcon: resources/icon.ico
  installerHeaderIcon: resources/icon.ico
  deleteAppDataOnUninstall: false
  runAfterFinish: true
  include: build/installer.nsh
  license: build/license.rtf

# Extra resources bundled alongside the app (accessible via process.resourcesPath)
extraResources:
  - from: resources/
    to: resources/
    filter:
      - "**"
      - "!icon.ico"
